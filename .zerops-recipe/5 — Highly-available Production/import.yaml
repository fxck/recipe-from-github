#zeropsPreprocessor=on

# Highly-available production environment provides a production setup with
# enhanced scaling, dedicated resources, and HA components for improved
# durability and performance.

# APP_KEY is Laravel's AES-256-CBC encryption key — must be identical across
# all app containers for session validity behind the L7 balancer at HA scale.
# corePackage: SERIOUS moves the project balancer, logging, and metrics onto
# dedicated infrastructure for consistent latency at production throughput.
project:
  name: laravel-minimal-ha-prod
  corePackage: SERIOUS
  envVariables:
    APP_KEY: <@generateRandomString(<32>)>

services:
  # HA production — cpuMode: DEDICATED pins CPU cores to this service so
  # shared-tenant noise cannot pollute request latency under sustained load.
  # minContainers: 2 plus autoscaling handles capacity; minFreeRamGB leaves
  # headroom for traffic spikes without waiting for scale-up.
  - hostname: app
    type: php-nginx@8.4
    zeropsSetup: prod
    buildFromGit: https://github.com/zerops-recipe-apps/laravel-minimal-app
    enableSubdomainAccess: true
    minContainers: 2
    verticalAutoscaling:
      cpuMode: DEDICATED
      minRam: 0.5
      minFreeRamGB: 0.25

  # PostgreSQL HA — replicates data across multiple nodes so a single node
  # failure causes no data loss or downtime. Dedicated CPU ensures database
  # operations do not compete with co-located workloads.
  - hostname: db
    type: postgresql@18
    priority: 10
    mode: HA
    verticalAutoscaling:
      cpuMode: DEDICATED
      minRam: 1
      minFreeRamGB: 0.5

