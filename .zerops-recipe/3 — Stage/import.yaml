#zeropsPreprocessor=on

# Stage environment uses the same configuration as production, but runs on a
# single container with lower scaling settings.

# APP_KEY is Laravel's AES-256-CBC encryption key. Project-level so the app
# container can decrypt session cookies and encrypted database columns written
# by any previous deploy.
project:
  name: laravel-minimal-stage
  envVariables:
    APP_KEY: <@generateRandomString(<32>)>

services:
  # Staging — mirrors production configuration (composer install --no-dev,
  # Vite asset build, runtime config:cache + route:cache + view:cache) but runs
  # on a single container with lower scaling bounds. Public subdomain for QA
  # review. Git integration or zcli push from CI triggers deploys.
  - hostname: app
    type: php-nginx@8.4
    zeropsSetup: prod
    buildFromGit: https://github.com/zerops-recipe-apps/laravel-minimal-app
    enableSubdomainAccess: true
    verticalAutoscaling:
      minRam: 0.5
      minFreeRamGB: 0.25

  # PostgreSQL single-node — hosts schema, sessions, cache, and queued jobs
  # for the minimal tier. NON_HA because staging data is replaceable and cost
  # efficiency matters.
  - hostname: db
    type: postgresql@18
    priority: 10
    mode: NON_HA
    verticalAutoscaling:
      minRam: 0.25
      minFreeRamGB: 0.25

